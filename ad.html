---
layout: none
---
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>시리즈 앱</title>
  <style>
    html, body{
      margin:0; padding:0;
      width:100%; height:100%;
      overflow:hidden;
      background:transparent;
      -webkit-text-size-adjust:100%;
      font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR",
                  "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    .stage{ position:relative; width:100%; height:100%; background:#ffffff; }

    .card{
      position:absolute; inset:0;
      box-sizing:border-box;
      width:100%; height:100%;
      padding:10px 12px;
      display:flex; align-items:center; justify-content:space-between;
      text-decoration:none; color:#111; background:#ffffff;

      opacity:0.001;
      transition:opacity 520ms ease;
      will-change:opacity;
      transform:translateZ(0);
    }
    .card.is-active{ opacity:1; }

    .left{ display:flex; align-items:center; gap:10px; min-width:0; flex:1 1 auto; }
    .badge{
      font-size:11px; line-height:1;
      padding:4px 6px; border-radius:999px;
      background:#f2f2f2; color:#555;
      flex:0 0 auto; white-space:nowrap;
    }
    .icon{
      width:44px; height:44px; border-radius:10px;
      flex:0 0 44px;
      object-fit:cover;
      display:block;
      background:#eee;
    }
    .meta{
      min-width:0; flex:1 1 auto;
      display:flex; flex-direction:column; justify-content:center;
    }
    .title{
      font-size:16px; font-weight:800; line-height:1.15;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .cta{
      flex:0 0 auto; margin-left:10px;
      font-size:12px; font-weight:700;
      padding:8px 10px; border-radius:10px;
      background:#111; color:#fff;
      white-space:nowrap;
    }
    .card:active{ opacity:0.96; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="stage" aria-label="시리즈 앱">
      <a id="cardA" class="card is-active" href="#">
        <div class="left">
          <span class="badge">시리즈 앱</span>
          <img class="icon" data-role="icon" src="" alt="" width="44" height="44" />
          <div class="meta"><div class="title" data-role="title"></div></div>
        </div>
        <span class="cta">받기</span>
      </a>

      <a id="cardB" class="card" href="#">
        <div class="left">
          <span class="badge">시리즈 앱</span>
          <img class="icon" data-role="icon" src="" alt="" width="44" height="44" />
          <div class="meta"><div class="title" data-role="title"></div></div>
        </div>
        <span class="cta">받기</span>
      </a>
    </div>
  </div>

  <script>
    const ALL_APPS = [
      { key:"sudoku", title:"할만한 스도쿠", webHref:"/apps/sudoku/", icon:"/assets/icons/sudoku-icon.png", alt:"할만한 스도쿠 아이콘", iosHref:"https://apps.apple.com/app/id6759184547" },
      { key:"triangle-hopscotch", title:"할만한 세모 땅따먹기", webHref:"/apps/triangle-hopscotch/", icon:"/assets/icons/triangle-hopscotch-icon.png", alt:"할만한 세모 땅따먹기 아이콘", iosHref:"https://apps.apple.com/app/id6759189170" },
      { key:"memorygame", title:"할만한 메모리 게임", webHref:"/apps/memorygame/", icon:"/assets/icons/memorygame-icon.png", alt:"할만한 메모리 게임 아이콘", iosHref:"https://apps.apple.com/app/id6759896288" },
      { key:"scanote", title:"쓸만한 스캔노트", webHref:"/apps/scanote/", icon:"/assets/icons/scanote-icon.png", alt:"쓸만한 스캔노트 아이콘", iosHref:"https://apps.apple.com/app/id6759282130" },
    ];

    const ORIGIN = window.location.origin;

    function isIOS(){
      const ua = navigator.userAgent || "";
      const iOS = /iPad|iPhone|iPod/.test(ua);
      const iPadOS13Plus = (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      return iOS || iPadOS13Plus;
    }

    function hashStringToInt(str){
      let h = 0;
      for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
      return h;
    }

    function preloadImage(url){
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    function fillCard(cardEl, app){
      const href = isIOS() ? app.iosHref : (ORIGIN + app.webHref);
      cardEl.href = href;

      const iconEl = cardEl.querySelector('[data-role="icon"]');
      const titleEl = cardEl.querySelector('[data-role="title"]');

      iconEl.src = ORIGIN + app.icon;
      iconEl.alt = app.alt;
      titleEl.textContent = app.title;
    }

    // ---- URL params ----
    const url = new URL(window.location.href);
    const tick = url.searchParams.get("tick") || "";
    const excludeKey = (url.searchParams.get("key") || "").trim();

    // ---- filtered list (exclude current app) ----
    let apps = ALL_APPS.filter(a => a.key !== excludeKey);

    // safety: excludeKey가 이상해서 0개가 되면 전체로 되돌림
    if (apps.length === 0) apps = ALL_APPS.slice();

    function startIndexFromTick(){
      if (!tick) return 0;
      return Math.abs(hashStringToInt(tick)) % apps.length;
    }

    // ---- crossfade setup ----
    const cardA = document.getElementById("cardA");
    const cardB = document.getElementById("cardB");

    let active = cardA;
    let next = cardB;

    let idx = startIndexFromTick();

    fillCard(active, apps[idx]);
    active.classList.add("is-active");
    next.classList.remove("is-active");

    const ROLL_MS = 10000;
    const FADE_MS = 520;
    let switching = false;

    async function switchTo(nextIdx){
      if (switching) return;
      switching = true;

      const app = apps[nextIdx];

      fillCard(next, app);
      await preloadImage(ORIGIN + app.icon);

      next.classList.add("is-active");
      active.classList.remove("is-active");

      setTimeout(() => {
        idx = nextIdx;
        const tmp = active; active = next; next = tmp;
        switching = false;
      }, FADE_MS + 30);
    }

    // 1개만 남아도 setInterval은 돌지만 화면은 안 바뀌게 처리
    if (apps.length > 1) {
      setInterval(() => {
        switchTo((idx + 1) % apps.length);
      }, ROLL_MS);
    }
  </script>
</body>
</html>
