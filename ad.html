---
layout: none
---
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>시리즈 앱</title>
  <style>
    html, body{
      margin:0; padding:0;
      width:100%; height:100%;
      overflow:hidden;
      background:transparent;
      -webkit-text-size-adjust:100%;
      font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR",
                  "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .stage{
      position:relative;
      width:100%;
      height:100%;
      background:#ffffff;
    }
    .card{
      position:absolute;
      inset:0;
      box-sizing:border-box;
      width:100%;
      height:100%;
      padding:10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      text-decoration:none;
      color:#111;
      background:#ffffff;

      opacity:0;
      transition:opacity 500ms ease;
      will-change:opacity;
      transform:translateZ(0);
    }
    .card.is-active{ opacity:1; }

    .left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1 1 auto;
    }
    .badge{
      font-size:11px;
      line-height:1;
      padding:4px 6px;
      border-radius:999px;
      background:#f2f2f2;
      color:#555;
      flex:0 0 auto;
      white-space:nowrap;
    }
    .icon{
      width:44px;
      height:44px;
      border-radius:10px;
      flex:0 0 auto;
      display:block;
    }
    .meta{
      min-width:0;
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      justify-content:center; /* title middle */
    }
    .title{
      font-size:16px;
      font-weight:800;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .cta{
      flex:0 0 auto;
      margin-left:10px;
      font-size:12px;
      font-weight:700;
      padding:8px 10px;
      border-radius:10px;
      background:#111;
      color:#fff;
      white-space:nowrap;
    }
    .card:active{ opacity:0.96; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="stage" aria-label="시리즈 앱">
      <a id="cardA" class="card is-active" href="#">
        <div class="left">
          <span class="badge">시리즈 앱</span>
          <img class="icon" data-role="icon" src="" alt="" width="44" height="44" />
          <div class="meta"><div class="title" data-role="title"></div></div>
        </div>
        <span class="cta">보기</span>
      </a>

      <a id="cardB" class="card" href="#">
        <div class="left">
          <span class="badge">시리즈 앱</span>
          <img class="icon" data-role="icon" src="" alt="" width="44" height="44" />
          <div class="meta"><div class="title" data-role="title"></div></div>
        </div>
        <span class="cta">보기</span>
      </a>
    </div>
  </div>

  <script>
    const apps = [
      {
        key:"sudoku",
        title:"할만한 스도쿠",
        webHref:"/apps/sudoku/",
        icon:"/assets/icons/sudoku-icon.png",
        alt:"할만한 스도쿠 아이콘",
        iosHref:"https://apps.apple.com/kr/app/%ED%95%A0%EB%A7%8C%ED%95%9C-%EC%8A%A4%EB%8F%84%EC%BF%A0/id6759184547"
      },
      {
        key:"triangle-hopscotch",
        title:"할만한 세모 땅따먹기",
        webHref:"/apps/triangle-hopscotch/",
        icon:"/assets/icons/triangle-hopscotch-icon.png",
        alt:"할만한 세모 땅따먹기 아이콘",
        iosHref:"https://apps.apple.com/kr/app/%ED%95%A0%EB%A7%8C%ED%95%9C-%EC%84%B8%EB%AA%A8-%EB%95%85%EB%94%B0%EB%A8%B9%EA%B8%B0/id6759189170"
      },
      {
        key:"memorygame",
        title:"할만한 메모리 게임",
        webHref:"/apps/memorygame/",
        icon:"/assets/icons/memorygame-icon.png",
        alt:"할만한 메모리 게임 아이콘",
        iosHref:"https://apps.apple.com/kr/app/%ED%95%A0%EB%A7%8C%ED%95%9C-%EB%A9%94%EB%AA%A8%EB%A6%AC-%EA%B2%8C%EC%9E%84/id6759896288"
      },
      {
        key:"scanote",
        title:"쓸만한 스캔노트",
        webHref:"/apps/scanote/",
        icon:"/assets/icons/scanote-icon.png",
        alt:"쓸만한 스캔노트 아이콘",
        iosHref:"https://apps.apple.com/kr/app/%EC%93%B8%EB%A7%8C%ED%95%9C-%EC%8A%A4%EC%BA%94%EB%85%B8%ED%8A%B8/id6759282130"
      },
    ];

    const ORIGIN = window.location.origin;

    function hashStringToInt(str){
      let h = 0;
      for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
      return h;
    }

    function startIndexFromTick(){
      const url = new URL(window.location.href);
      const tick = url.searchParams.get("tick") || "";
      if (!tick) return 0;
      return Math.abs(hashStringToInt(tick)) % apps.length;
    }

    function isIOS(){
      // iOS WebView/사파리 대부분 커버 (iPadOS도 포함)
      const ua = navigator.userAgent || "";
      const iOS = /iPad|iPhone|iPod/.test(ua);
      const iPadOS13Plus = (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      return iOS || iPadOS13Plus;
    }

    function fillCard(cardEl, app){
      const href = isIOS() ? app.iosHref : (ORIGIN + app.webHref);
      cardEl.href = href;

      const iconEl = cardEl.querySelector('[data-role="icon"]');
      const titleEl = cardEl.querySelector('[data-role="title"]');

      iconEl.src = ORIGIN + app.icon;
      iconEl.alt = app.alt;
      titleEl.textContent = app.title;
    }

    const cardA = document.getElementById("cardA");
    const cardB = document.getElementById("cardB");

    let active = cardA;
    let next = cardB;

    let idx = startIndexFromTick();

    fillCard(active, apps[idx]);
    active.classList.add("is-active");
    next.classList.remove("is-active");

    const ROLL_MS = 10000;
    const FADE_MS = 500;

    setInterval(() => {
      const nextIdx = (idx + 1) % apps.length;
      fillCard(next, apps[nextIdx]);

      next.classList.add("is-active");
      active.classList.remove("is-active");

      setTimeout(() => {
        idx = nextIdx;
        const tmp = active;
        active = next;
        next = tmp;
      }, FADE_MS + 30);
    }, ROLL_MS);
  </script>
</body>
</html>
