---
layout: none
---
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>추천 앱</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden; /* noscroll */
      background: transparent;
      -webkit-text-size-adjust: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR",
                   "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;     /* middle */
      justify-content: center; /* center */
    }

    /* WebView 안을 꽉 채우는 배너 카드 */
    .card {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px; /* 내부 여백만 */
      text-decoration: none;
      color: #111;
      background: #ffffff;
      transition: opacity 220ms ease;
    }

    .card.fade-out { opacity: 0; }
    .card.fade-in  { opacity: 1; }

    .badge {
      font-size: 11px;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 999px;
      background: #f2f2f2;
      color: #555;
      flex: 0 0 auto;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      flex: 0 0 auto;
      display: block;
    }

    .meta {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sub {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cta {
      font-size: 12px;
      font-weight: 700;
      padding: 8px 10px;
      border-radius: 10px;
      background: #111;
      color: #fff;
      flex: 0 0 auto;
    }

    .card:active { opacity: 0.92; }
  </style>
</head>

<body>
  <div class="wrap">
    <a id="adCard" class="card" href="#" aria-label="추천 앱">
      <span class="badge">추천 앱</span>
      <img id="adIcon" class="icon" src="" alt="" width="44" height="44" />
      <div class="meta">
        <div id="adTitle" class="title"></div>
        <div id="adSub" class="sub">앱 설명 페이지</div>
      </div>
      <span class="cta">보기</span>
    </a>
  </div>

  <script>
    const apps = [
      {
        key: "sudoku",
        title: "할만한 스도쿠",
        href: "/apps/sudoku/",
        icon: "/assets/icons/sudoku-icon.png",
        alt: "할만한 스도쿠 아이콘",
      },
      {
        key: "triangle-hopscotch",
        title: "할만한 세모 땅따먹기",
        href: "/apps/triangle-hopscotch/",
        icon: "/assets/icons/triangle-hopscotch-icon.png",
        alt: "할만한 세모 땅따먹기 아이콘",
      },
      {
        key: "memorygame",
        title: "할만한 메모리 게임",
        href: "/apps/memorygame/",
        icon: "/assets/icons/memorygame-icon.png",
        alt: "할만한 메모리 게임 아이콘",
      },
      {
        key: "scanote",
        title: "쓸만한 스캔노트",
        href: "/apps/scanote/",
        icon: "/assets/icons/scanote-icon.png",
        alt: "쓸만한 스캔노트 아이콘",
      },
    ];

    const ORIGIN = window.location.origin;

    function hashStringToInt(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = (h * 31 + str.charCodeAt(i)) | 0;
      }
      return h;
    }

    // tick으로 "시작 앱"을 결정 (최초 선택에만 영향)
    function startIndexFromTick() {
      const url = new URL(window.location.href);
      const tick = url.searchParams.get("tick") || "";
      if (!tick) return 0;
      return Math.abs(hashStringToInt(tick)) % apps.length;
    }

    const card = document.getElementById("adCard");
    const icon = document.getElementById("adIcon");
    const title = document.getElementById("adTitle");

    let idx = startIndexFromTick();

    function render(i) {
      const app = apps[i];
      card.href = ORIGIN + app.href;   // absolute to avoid relative issues
      icon.src = ORIGIN + app.icon;
      icon.alt = app.alt;
      title.textContent = app.title;
    }

    // 부드럽게 전환
    function rollTo(nextIdx) {
      card.classList.add("fade-out");
      setTimeout(() => {
        idx = nextIdx;
        render(idx);
        card.classList.remove("fade-out");
        card.classList.add("fade-in");
        setTimeout(() => card.classList.remove("fade-in"), 220);
      }, 220);
    }

    // 최초 렌더
    render(idx);

    // 롤링 주기 (ms) - 필요하면 8000/10000 등으로 조정
    const ROLL_MS = 10000;

    setInterval(() => {
      const next = (idx + 1) % apps.length;
      rollTo(next);
    }, ROLL_MS);
  </script>
</body>
</html>
